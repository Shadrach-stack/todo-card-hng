<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" class="card">
      <h2 data-testid="test-todo-title" id="todo-title">Complete HNG Task</h2>

      <div data-testid="test-todo-collapsible-section" id="desc-box">
        <p data-testid="test-todo-description" id="desc-text">
          Build a testable todo card with accessibility and responsiveness. This
          is a longer description to test expand and collapse behavior properly.
        </p>
      </div>

      <button
        data-testid="test-todo-expand-toggle"
        id="expand-btn"
        aria-expanded="false"
        aria-controls="desc-box"
      >
        Expand
      </button>

      <span
        data-testid="test-todo-priority"
        aria-label="High Priority"
        class="priority high"
      >
        High
      </span>

      <p>
        <time data-testid="test-todo-due-date" datetime="2026-03-01T18:00:00Z">
          Due March 1, 2026
        </time>
      </p>

      <p data-testid="test-todo-time-remaining" id="time-remaining">
        Calculating...
      </p>

      <span data-testid="test-todo-status" id="status"> Pending </span>

      <label for="status-control">Status</label>
      <select id="status-control" data-testid="test-todo-status-control">
        <option>Pending</option>
        <option>In Progress</option>
        <option>Done</option>
      </select>

      <div>
        <input
          type="checkbox"
          id="complete-toggle"
          data-testid="test-todo-complete-toggle"
        />
        <label for="complete-toggle">Mark as complete</label>
      </div>

      <ul data-testid="test-todo-tags">
        <li data-testid="test-todo-tag-work">Work</li>
        <li data-testid="test-todo-tag-urgent">Urgent</li>
      </ul>

      <button data-testid="test-todo-edit-button">Edit</button>

      <button data-testid="test-todo-delete-button">Delete</button>
      <!-- EDIT FORM (hidden by default)-->
      <form
        data-testid="test-todo-edit-form"
        id="edit-form"
        style="display: none"
      >
        <label for="edit-title">Title</label>
        <input
          id="edit-title"
          data-testid="test-todo-edit-title-input"
          type="text"
        />

        <label for="edit-desc">Description</label>
        <textarea id="edit-desc" data-testid="test-todo-edit-description-input">
        </textarea>

        <label for="edit-priority">Priority</label>
        <select id="edit-priority" data-testid="test-todo-edit-priority-select">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <label for="edit-date">Due Date</label>
        <input
          id="edit-date"
          type="datetime-local"
          data-testid="test-todo-edit-due-date-input"
        />

        <button type="button" data-testid="test-todo-save-button" id="save-btn">
          Save
        </button>

        <button
          type="button"
          data-testid="test-todo-cancel-button"
          id="cancel-btn"
        >
          Cancel
        </button>
      </form>
    </article>

    <script src="script.js"></script>
  </body>
</html>
